<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Administrativo</title>

<style>

body{
font-family:Arial;
background:#f5f1eb;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
color:#4b2e2e;
}

.total{
background:#4b2e2e;
color:white;
padding:20px;
font-size:30px;
text-align:center;
border-radius:20px;
margin-bottom:20px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card h3{
margin-bottom:10px;
}

</style>
</head>
<body>

<h1>📊 Corte del Día</h1>

<div class="total" id="totalGeneral">
Total vendido: $0
</div>

<div id="ventas"></div>

<script>

const scriptURL = 'https://script.google.com/macros/s/AKfycbyZNEXFE6vSkOcREYdJm3Jc7dgXareO91jyfoTxtub3c6PL5R264YjYfLeQMAfzokpW/exec';

async function cargarVentas(){

const respuesta = await fetch(scriptURL);

const data = await respuesta.json();

const contenedor = document.getElementById('ventas');

let total = 0;

contenedor.innerHTML = '';

data.reverse().forEach(v=>{

 total += Number(v.total);

 contenedor.innerHTML += `
 <div class="card">
 <h3>${v.folio}</h3>
 <p><b>Fecha:</b> ${v.fecha}</p>
 <p><b>Cliente:</b> ${v.cliente}</p>
 <p><b>Productos:</b> ${v.productos}</p>
 <p><b>Total:</b> $${v.total}</p>
 <p><b>Pago:</b> ${v.pago}</p>
 <p><b>Entrega:</b> ${v.tipo}</p>
 </div>
 `;

});

 document.getElementById('totalGeneral').innerText =
 'Total vendido: $'+total;

}

cargarVentas();

</script>

</body>
</html>
